name: Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
   build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Install Doxygen 1.12.0
      env:
        DOXYGEN_VERSION: 1.12.0
      run: |
        archive="$RUNNER_TEMP/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
        release_version="${DOXYGEN_VERSION//./_}"
        curl --fail --location --silent --show-error \
          --output "$archive" \
          "https://github.com/doxygen/doxygen/releases/download/Release_${release_version}/doxygen-${DOXYGEN_VERSION}.linux.bin.tar.gz"
        tar --extract --gzip --file "$archive" --directory "$RUNNER_TEMP"
        echo "$RUNNER_TEMP/doxygen-${DOXYGEN_VERSION}/bin" >> "$GITHUB_PATH"

    - name: Verify Doxygen version
      run: |
        doxygen_version="$(doxygen --version)"
        echo "Doxygen ${doxygen_version}"
        test "$doxygen_version" = "1.12.0"

    - name: Configure Pages
      uses: actions/configure-pages@v6

    - name: Generate documentation
      run: doxygen Doxyfile

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: build/doxygen/html

    - name: Deploy
      id: deployment
      uses: actions/deploy-pages@v5
